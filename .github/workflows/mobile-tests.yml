name: Mobile Tests

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  android-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Appium
        run: |
          npm install --location=global appium
          appium driver install uiautomator2

      - name: Run Maven tests
        run: |
          mvn clean test \
            -Dplatform=android \
            -DdeviceName=Android_Emulator \
            -Dapp.path=apps/demo.apk \
            -Dcucumber.filter.tags="@smoke"

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            target/cucumber-report.html
            target/logs/